name: CI

on:
  push:
    branches:
      - dev
      - staging
      - main

# Prevent overlapping deploys on staging
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Type check (server)
        run: npx tsc --noEmit

      - name: Install Vue dependencies
        run: cd src/web && npm ci

      - name: Type check (Vue)
        run: cd src/web && npx vue-tsc --noEmit

      - name: Build Vue app
        run: npm run build:web

  # ── DB-backed integration tests ──
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: letagents_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d letagents_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DB_URL: postgres://test:test@localhost:5432/letagents_test
      GITHUB_WEBHOOK_SECRET: test-webhook-secret
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run message attachment tests
        run: >-
          node
          --import ./node_modules/tsx/dist/loader.mjs
          --test
          src/api/__tests__/message-attachments.test.ts
          src/api/__tests__/message-attachments-db.test.ts

      - name: Run webhook integration tests
        run: >-
          node
          --import ./node_modules/tsx/dist/loader.mjs
          --test
          src/api/__tests__/github-webhook-integration.test.ts

      - name: Run repo room access integration tests
        timeout-minutes: 5
        run: >-
          node
          --import ./node_modules/tsx/dist/loader.mjs
          --test
          src/api/__tests__/repo-room-access-integration.test.ts

      - name: Run repo migration tests
        run: >-
          node
          --import ./node_modules/tsx/dist/loader.mjs
          --test
          src/api/__tests__/github-repo-migration.test.ts

      - name: Run workflow lookup tests
        run: >-
          node
          --import ./node_modules/tsx/dist/loader.mjs
          --test
          src/api/__tests__/repo-workflow-lookup.test.ts

      - name: Run coordination DB tests
        run: >-
          node
          --import ./node_modules/tsx/dist/loader.mjs
          --test
          src/api/__tests__/coordination-db.test.ts

      - name: Run worker session auth tests
        run: >-
          node
          --import ./node_modules/tsx/dist/loader.mjs
          --test
          src/api/__tests__/worker-session-auth-integration.test.ts

      - name: Run focus room tests
        timeout-minutes: 5
        run: >-
          node
          --import ./node_modules/tsx/dist/loader.mjs
          --test
          src/api/__tests__/focus-rooms.test.ts

      - name: Run focus lineage repair tests
        run: >-
          node
          --import ./node_modules/tsx/dist/loader.mjs
          --test
          src/api/__tests__/focus-lineage-repair.test.ts

  # ── Build and push Docker images to GHCR ──
  docker:
    needs: [build, integration-tests]
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push the production app image
      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ""
          push: true
          tags: |
            ghcr.io/brosincode/letagents:latest
            ghcr.io/brosincode/letagents:${{ steps.vars.outputs.sha_tag }}

      # Build and push the migration image (includes drizzle-kit)
      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrator
          push: true
          tags: |
            ghcr.io/brosincode/letagents:latest-migrate
            ghcr.io/brosincode/letagents:${{ steps.vars.outputs.sha_tag }}-migrate

  # ── Deploy to production server ──
  deploy:
    needs: docker
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: 134.209.165.143
          username: emmy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            IMAGE_TAG="${{ needs.docker.outputs.image_tag }}"

            cd ~/letagents

            # Fetch and checkout the exact commit that triggered this deploy
            git fetch origin staging
            git checkout ${{ github.sha }}

            # Pull the exact images built by this CI run
            docker pull "ghcr.io/brosincode/letagents:${IMAGE_TAG}"
            docker pull "ghcr.io/brosincode/letagents:${IMAGE_TAG}-migrate"

            # Tag as latest locally so docker compose uses them
            docker tag "ghcr.io/brosincode/letagents:${IMAGE_TAG}" "ghcr.io/brosincode/letagents:latest"
            docker tag "ghcr.io/brosincode/letagents:${IMAGE_TAG}-migrate" "ghcr.io/brosincode/letagents:latest-migrate"

            # Run schema push plus targeted repair steps using the baked-in migrator
            docker compose --profile migrate run --rm migrate

            # Stop systemd service if it's still running (one-time migration)
            sudo systemctl stop letagents 2>/dev/null || true
            sudo systemctl disable letagents 2>/dev/null || true

            # Stop any existing container before starting fresh
            docker compose down 2>/dev/null || true

            # Start app with the new image
            docker compose up -d

            # Wait for container to be healthy
            sleep 5

            # Health check
            curl -f http://127.0.0.1:3001/api/health || {
              echo "Health check failed!"
              docker compose logs --tail 20
              exit 1
            }

            echo "Deploy successful (${IMAGE_TAG})"
