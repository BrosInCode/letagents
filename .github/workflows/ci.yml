name: CI

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Type check (server)
        run: npx tsc --noEmit

      - name: Install Vue dependencies
        run: cd src/web && npm ci

      - name: Type check (Vue)
        run: cd src/web && npx vue-tsc --noEmit

      - name: Build Vue app
        run: npm run build:web

  # ── Build and push Docker image to GHCR ──
  docker:
    needs: build
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/brosincode/letagents
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Deploy to production server ──
  deploy:
    needs: docker
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: 134.209.165.143
          username: emmy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            cd ~/letagents

            # Pull latest code (for docker-compose.yml and drizzle migrations)
            git pull origin staging

            # Pull the new image from GHCR (public repo — no auth needed)
            docker compose pull

            # Run database migrations (one-shot container with DB access)
            docker compose run --rm api npx drizzle-kit push

            # Restart with new image
            docker compose up -d

            # Wait for container to be healthy
            sleep 5

            # Health check
            curl -f http://127.0.0.1:3001/api/health || {
              echo "Health check failed!"
              docker compose logs --tail 20
              exit 1
            }

            echo "Deploy successful"
