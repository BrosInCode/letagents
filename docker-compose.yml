services:
  api:
    build: .
    container_name: letagents-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - pinflix-server_default

networks:
  pinflix-server_default:
    external: true
