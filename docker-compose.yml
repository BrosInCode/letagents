services:
  api:
    image: ghcr.io/brosincode/letagents:latest
    container_name: letagents-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LETAGENTS_WEB_MODE=vue
    networks:
      - pinflix-server_default

networks:
  pinflix-server_default:
    external: true
